<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>La Nueva 5:40 | Radio en Vivo</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#05080f">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --neon-lime: #a3cf33;
      --neon-blue: #3fb4e5;
      --deep-bg: #05080f;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--deep-bg);
      color: #ffffff;
      margin: 0;
      overflow-x: hidden;
    }

    #root:empty {
      background: #05080f;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #root:empty::after {
      content: "";
      width: 50px;
      height: 50px;
      border: 3px solid rgba(163, 207, 51, 0.1);
      border-top: 3px solid var(--neon-lime);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes spin-slow {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes marquee {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    .animate-spin-slow {
      animation: spin-slow 8s linear infinite;
    }

    .animate-marquee {
      animation: marquee 30s linear infinite;
      display: inline-flex;
      white-space: nowrap;
    }

    .glass-dark {
      background: rgba(10, 15, 25, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
