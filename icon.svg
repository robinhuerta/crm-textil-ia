<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05080f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1420;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="110" fill="url(#bgGradient)"/>
  
  <!-- Radio waves (subtle background) -->
  <g opacity="0.15">
    <circle cx="256" cy="256" r="200" fill="none" stroke="#a3cf33" stroke-width="3"/>
    <circle cx="256" cy="256" r="160" fill="none" stroke="#a3cf33" stroke-width="3"/>
    <circle cx="256" cy="256" r="120" fill="none" stroke="#a3cf33" stroke-width="3"/>
  </g>
  
  <!-- Main text "5:40" with glow effect -->
  <text 
    x="256" 
    y="310" 
    font-family="'Plus Jakarta Sans', 'Arial Black', sans-serif" 
    font-size="180" 
    font-weight="900" 
    text-anchor="middle" 
    fill="#a3cf33"
    filter="url(#glow)">5:40</text>
  
  <!-- Microphone icon -->
  <g transform="translate(256, 140)" opacity="0.9">
    <circle cx="0" cy="0" r="35" fill="#a3cf33" opacity="0.2"/>
    <path d="M -15,-15 L -15,5 Q -15,20 0,20 Q 15,20 15,5 L 15,-15 Q 15,-25 0,-25 Q -15,-25 -15,-15 Z" 
          fill="#a3cf33"/>
    <path d="M -25,5 Q -25,30 0,35 Q 25,30 25,5" 
          fill="none" 
          stroke="#a3cf33" 
          stroke-width="5" 
          stroke-linecap="round"/>
    <line x1="0" y1="35" x2="0" y2="45" stroke="#a3cf33" stroke-width="5" stroke-linecap="round"/>
    <line x1="-15" y1="45" x2="15" y2="45" stroke="#a3cf33" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
